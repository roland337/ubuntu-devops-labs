version: '3.8'

services:
  # 1. Grafana Loki: Gudang penyimpanan data teks log
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring-stack_monitoring-network

  # 2. Promtail: Agen lapangan yang menyedot log dari kontainer Docker
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - monitoring-stack_monitoring-network

networks:
  monitoring-stack_monitoring-network:
    external: true
