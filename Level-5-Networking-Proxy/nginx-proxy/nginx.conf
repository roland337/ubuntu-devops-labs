--------------------------------------------------------------------------------
[LEVEL 5: ADVANCED NETWORKING & PATH-BASED REVERSE PROXY]
--------------------------------------------------------------------------------
* Deskripsi: Mengintegrasikan website mandiri ke dalam port standar HTTP (Port 80) 
  menggunakan metode Path-Based Routing via Nginx Reverse Proxy, serta optimasi 
  penanganan error perizinan sistem (403 Forbidden).

* Prosedur Taktis Mengatasi Error 403 Forbidden (Hak Akses):
  - Masalah: Nginx Docker tidak diizinkan membaca file index.html di folder lokal.
  - Solusi CLI: Ubah perizinan folder & gunakan jalur absolut pada volume mounting.
    $ mkdir -p /var/www/html/web-sederhana
    $ chmod -R 755 /var/www/html/web-sederhana
    $ docker run -d --name web-roland -p 8085:80 -v /var/www/html/web-sederhana:/usr/share/nginx/html nginx:alpine

* Cetak Biru File Konfigurasi Satpam Utama (nginx.conf - Path Routing):
  - Lokasi Berkas Proxy Utama pada Port 80:
  ==============================================================================
  server {
      listen 80;
      server_name 192.168.56.101; # IP Host-Only Ubuntu Server Lab

      # Jalur Utama (Default): Diarahkan ke LAMP Stack Apache (Port 8081)
      location / {
          proxy_pass http://127.0.0.1:8081/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      # Jalur Path Khusus (/web-sederhana): Diarahkan ke Nginx Alpine (Port 8085)
      location /web-sederhana/ {
          proxy_pass http://127.0.0.1:8085/; # Trailing slash wajib ada!
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
  }
  ==============================================================================

* Arsitektur Hasil Akhir Pengujian Browser (Laptop Utama):
  1. Akses langsung via Port kustom: http://192.168.56.101:8085
  2. Akses bersih via Path Proxy  : http://192.168.56.101/web-sederhana

